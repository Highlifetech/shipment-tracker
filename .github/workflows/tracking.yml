name: Shipment Tracking Bot

on:
  schedule:
    # 8:00 AM EST = 13:00 UTC
    - cron: '0 13 * * *'
    # 8:00 PM EST = 01:00 UTC next day
    - cron: '0 1 * * *'
    # Exception check every hour (at :30 to never overlap with 8am/8pm)
    - cron: '30 * * * *'
  workflow_dispatch:

jobs:
  track-shipments:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore status cache
        uses: actions/cache@v4
        with:
          path: /tmp/shipment_status_cache.json
          key: shipment-status-cache-${{ github.run_id }}
          restore-keys: |
            shipment-status-cache-

      - name: Run full tracking summary (8am and 8pm EST)
        if: github.event.schedule == '0 13 * * *' || github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_URL: ${{ secrets.LARK_BASE_URL }}
          LARK_CHAT_ID: ${{ secrets.LARK_CHAT_ID }}
          LARK_SHEET_TOKENS: ${{ secrets.LARK_SHEET_TOKENS }}
          LARK_SHEET_OWNERS: ${{ secrets.LARK_SHEET_OWNERS }}
          FEDEX_API_KEY: ${{ secrets.FEDEX_API_KEY }}
          FEDEX_SECRET_KEY: ${{ secrets.FEDEX_SECRET_KEY }}
          UPS_CLIENT_ID: ${{ secrets.UPS_CLIENT_ID }}
          UPS_CLIENT_SECRET: ${{ secrets.UPS_CLIENT_SECRET }}
          USPS_CLIENT_ID: ${{ secrets.USPS_CLIENT_ID }}
          USPS_CLIENT_SECRET: ${{ secrets.USPS_CLIENT_SECRET }}
          DHL_API_KEY: ${{ secrets.DHL_API_KEY }}
          STATUS_CACHE_PATH: /tmp/shipment_status_cache.json
        run: python main.py

      - name: Check for shipment exceptions (every hour)
        if: github.event.schedule == '30 * * * *'
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_URL: ${{ secrets.LARK_BASE_URL }}
          LARK_CHAT_ID: ${{ secrets.LARK_CHAT_ID }}
          LARK_SHEET_TOKENS: ${{ secrets.LARK_SHEET_TOKENS }}
          LARK_SHEET_OWNERS: ${{ secrets.LARK_SHEET_OWNERS }}
          FEDEX_API_KEY: ${{ secrets.FEDEX_API_KEY }}
          FEDEX_SECRET_KEY: ${{ secrets.FEDEX_SECRET_KEY }}
          UPS_CLIENT_ID: ${{ secrets.UPS_CLIENT_ID }}
          UPS_CLIENT_SECRET: ${{ secrets.UPS_CLIENT_SECRET }}
          USPS_CLIENT_ID: ${{ secrets.USPS_CLIENT_ID }}
          USPS_CLIENT_SECRET: ${{ secrets.USPS_CLIENT_SECRET }}
          DHL_API_KEY: ${{ secrets.DHL_API_KEY }}
          STATUS_CACHE_PATH: /tmp/shipment_status_cache.json
        run: python main.py --check-exceptions

      - name: Save status cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/shipment_status_cache.json
          key: shipment-status-cache-${{ github.run_id }}
